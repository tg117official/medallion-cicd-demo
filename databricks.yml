bundle:
  name: medallion-cicd-demo

include:
  - resources/*.yml

variables:
  catalog_name:
    default: demo_catalog
  schema_name:
    default: demo_schema
  env_name:
    default: dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-DEV-WORKSPACE-URL
    variables:
      catalog_name: dev_catalog
      schema_name: medallion_dev
      env_name: dev

  uat:
    workspace:
      host: https://adb-UAT-WORKSPACE-URL
    variables:
      catalog_name: uat_catalog
      schema_name: medallion_uat
      env_name: uat

  preprod:
    workspace:
      host: https://adb-PREPROD-WORKSPACE-URL
    variables:
      catalog_name: preprod_catalog
      schema_name: medallion_preprod
      env_name: preprod

  prod:
    workspace:
      host: https://adb-PROD-WORKSPACE-URL
    variables:
      catalog_name: prod_catalog
      schema_name: medallion_prod
      env_name: prod