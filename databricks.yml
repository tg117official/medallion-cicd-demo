bundle:
  name: medallion-cicd-demo

include:
  - resources/*.yml

variables:
  catalog_name:
    default: dev_main
  bronze_schema:
    default: bronze
  silver_schema:
    default: silver
  gold_schema:
    default: gold
  env_name:
    default: dev

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-7405618116641663.3.azuredatabricks.net
    variables:
      catalog_name: dev_main
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      env_name: dev

  uat:
    mode: development
    workspace:
      host: https://adb-7405606563347978.18.azuredatabricks.net/
    variables:
      catalog_name: uat_main
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      env_name: uat

  preprod:
    mode: development
    workspace:
      host: https://adb-7405610359692627.7.azuredatabricks.net/
    variables:
      catalog_name: preprod_main
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      env_name: preprod

  prod:
    mode: production
    workspace:
      host: https://adb-7405615995431469.9.azuredatabricks.net/
    variables:
      catalog_name: prod_main
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      env_name: prod